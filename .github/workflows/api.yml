name: Api - Test, Build and Push

on:
  # CI (build + smoke-test) runs on pull requests. Push only triggers on main, which
  # additionally deploys. Feature-branch pushes do not run the pipeline; open a PR instead.
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Build the API + migrator images ONCE, with layer caching, and push them.
  # Downstream jobs pull these exact images instead of rebuilding.
  build:
    runs-on: ubuntu-latest
    outputs:
      api_ref: ${{ steps.tags.outputs.api_ref }}
      migrator_ref: ${{ steps.tags.outputs.migrator_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          repo="${REGISTRY}/${IMAGE_NAME,,}"          # GHCR requires lowercase
          sha="${GITHUB_SHA::12}"
          deploy=false
          if [ "$GITHUB_REF" = "refs/heads/main" ]; then
            deploy=true
          fi

          api_ref="${repo}:sha-${sha}"
          migrator_ref="${repo}:migrator-${sha}"

          api_tags="$api_ref"
          migrator_tags="$migrator_ref"
          if [ "$deploy" = "true" ]; then
            api_tags="${api_tags}"$'\n'"${repo}:latest"
            migrator_tags="${migrator_tags}"$'\n'"${repo}:migrator"
          fi

          echo "api_ref=$api_ref" >> "$GITHUB_OUTPUT"
          echo "migrator_ref=$migrator_ref" >> "$GITHUB_OUTPUT"
          {
            echo "api_tags<<EOF";      echo "$api_tags";      echo "EOF"
            echo "migrator_tags<<EOF"; echo "$migrator_tags"; echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: final
          push: true
          tags: ${{ steps.tags.outputs.api_tags }}
          cache-from: type=gha,scope=doodoo
          cache-to: type=gha,mode=max,scope=doodoo

      - name: Build & push migrator
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: migrator
          push: true
          tags: ${{ steps.tags.outputs.migrator_tags }}
          cache-from: type=gha,scope=doodoo
          cache-to: type=gha,mode=max,scope=doodoo

  # Pull the freshly built images and verify the stack boots + is healthy.
  smoke-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run migrator + API and health-check
        env:
          API_IMAGE: ${{ needs.build.outputs.api_ref }}
          MIGRATOR_IMAGE: ${{ needs.build.outputs.migrator_ref }}
          CONN: Host=db;Port=5432;Database=doodoodb;Username=doodoo;Password=doodoo
        run: |
          set -euo pipefail
          docker network create doodoo-ci
          docker run -d --name db --network doodoo-ci \
            -e POSTGRES_USER=doodoo -e POSTGRES_PASSWORD=doodoo -e POSTGRES_DB=doodoodb \
            --health-cmd "pg_isready -U doodoo -d doodoodb" --health-interval 2s --health-timeout 2s --health-retries 30 \
            postgres:16

          echo "Waiting for db to be healthy..."
          for i in $(seq 1 30); do
            [ "$(docker inspect -f '{{.State.Health.Status}}' db)" = "healthy" ] && break
            sleep 2
          done

          echo "Running migrator..."
          docker run --rm --network doodoo-ci -e ConnectionStrings__Db="$CONN" "$MIGRATOR_IMAGE"

          echo "Starting API..."
          docker run -d --name api --network doodoo-ci \
            -e ConnectionStrings__Db="$CONN" -e ASPNETCORE_ENVIRONMENT=Development \
            -p 5001:8080 "$API_IMAGE"

          echo "Health check..."
          ok=
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:5001/health; then echo; echo "healthy"; ok=1; break; fi
            echo "waiting for api... ($i/30)"; sleep 2
          done
          if [ -z "$ok" ]; then echo "API not healthy"; docker logs api; exit 1; fi

      - name: Cleanup
        if: always()
        run: |
          docker rm -f api db >/dev/null 2>&1 || true
          docker network rm doodoo-ci >/dev/null 2>&1 || true

  deploy:
    runs-on: ubuntu-latest
    needs: smoke-test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          # The login shell on the server is PowerShell (pwsh), so this script is PowerShell.
          # The GHCR token is injected directly (GitHub masks it in logs); appleboy's `envs:`
          # uses bash `export`, which does not work in pwsh.
          script: |
            Set-Location /opt/doodoo

            # Login to GHCR
            "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u sandordost --password-stdin
            if ($LASTEXITCODE -ne 0) { throw "docker login failed" }

            # retry pull
            for ($i = 1; $i -le 5; $i++) {
              docker compose pull
              if ($LASTEXITCODE -eq 0) { break }
              Write-Host "pull failed, retry $i/5..."
              Start-Sleep -Seconds 5
            }

            docker compose up -d db
            docker compose run --rm migrator
            if ($LASTEXITCODE -ne 0) { throw "migrator failed" }
            docker compose up -d --remove-orphans
            if ($LASTEXITCODE -ne 0) { throw "compose up failed" }
