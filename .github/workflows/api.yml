name: Api - Test, Build and Push

on:
  # CI (build + smoke-test) runs on pull requests. Push only triggers on main, which
  # additionally publishes images and deploys. Feature-branch pushes do not run the
  # pipeline; open a PR instead.
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Build the images locally (cached), verify the stack boots, and publish only on main.
  # Pull requests never push to GHCR (fork-safe, no registry noise) — the smoke test runs
  # against the locally-loaded images.
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (local, cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: final
          load: true
          tags: doodoo-local:api
          cache-from: type=gha,scope=doodoo
          cache-to: type=gha,mode=max,scope=doodoo

      - name: Build migrator image (local, cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: migrator
          load: true
          tags: doodoo-local:migrator
          cache-from: type=gha,scope=doodoo
          cache-to: type=gha,mode=max,scope=doodoo

      - name: Smoke test (migrator + API against Postgres)
        env:
          CONN: Host=db;Port=5432;Database=doodoodb;Username=doodoo;Password=doodoo
        run: |
          set -euo pipefail
          docker network create doodoo-ci
          docker run -d --name db --network doodoo-ci \
            -e POSTGRES_USER=doodoo -e POSTGRES_PASSWORD=doodoo -e POSTGRES_DB=doodoodb \
            --health-cmd "pg_isready -U doodoo -d doodoodb" --health-interval 2s --health-timeout 2s --health-retries 30 \
            postgres:16

          echo "Waiting for db to be healthy..."
          for i in $(seq 1 30); do
            [ "$(docker inspect -f '{{.State.Health.Status}}' db)" = "healthy" ] && break
            sleep 2
          done

          echo "Running migrator..."
          docker run --rm --network doodoo-ci -e ConnectionStrings__Db="$CONN" doodoo-local:migrator

          echo "Starting API..."
          docker run -d --name api --network doodoo-ci \
            -e ConnectionStrings__Db="$CONN" -e ASPNETCORE_ENVIRONMENT=Development \
            -p 5001:8080 doodoo-local:api

          echo "Health check..."
          ok=
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:5001/health; then echo; echo "healthy"; ok=1; break; fi
            echo "waiting for api... ($i/30)"; sleep 2
          done
          if [ -z "$ok" ]; then echo "API not healthy"; docker logs api; exit 1; fi

      - name: Cleanup
        if: always()
        run: |
          docker rm -f api db >/dev/null 2>&1 || true
          docker network rm doodoo-ci >/dev/null 2>&1 || true

      # ---- Publish to GHCR: main only (never on pull_request) ----
      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag & push images
        if: github.ref == 'refs/heads/main'
        run: |
          repo="${REGISTRY}/${IMAGE_NAME,,}"   # GHCR requires lowercase
          sha="${GITHUB_SHA::12}"
          docker tag doodoo-local:api      "${repo}:latest"
          docker tag doodoo-local:api      "${repo}:sha-${sha}"
          docker tag doodoo-local:migrator "${repo}:migrator"
          docker tag doodoo-local:migrator "${repo}:migrator-${sha}"
          docker push "${repo}:latest"
          docker push "${repo}:sha-${sha}"
          docker push "${repo}:migrator"
          docker push "${repo}:migrator-${sha}"

  deploy:
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          # The login shell on the server is PowerShell (pwsh), so this script is PowerShell.
          # The GHCR token is injected directly (GitHub masks it in logs); appleboy's `envs:`
          # uses bash `export`, which does not work in pwsh.
          script: |
            Set-Location /opt/doodoo

            # Login to GHCR
            "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u sandordost --password-stdin
            if ($LASTEXITCODE -ne 0) { throw "docker login failed" }

            # retry pull
            for ($i = 1; $i -le 5; $i++) {
              docker compose pull
              if ($LASTEXITCODE -eq 0) { break }
              Write-Host "pull failed, retry $i/5..."
              Start-Sleep -Seconds 5
            }

            docker compose up -d db
            docker compose run --rm migrator
            if ($LASTEXITCODE -ne 0) { throw "migrator failed" }
            docker compose up -d --remove-orphans
            if ($LASTEXITCODE -ne 0) { throw "compose up failed" }
